name: Seedance Prompt Scout

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: write

concurrency:
  group: seedance-prompt-scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Seedance prompt scout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          STACKAPPS_KEY: ${{ secrets.STACKAPPS_KEY }}
        run: python scripts/seedance_prompt_scout.py

      - name: Commit scout results
        shell: bash
        run: |
          if [ -z "$(git status --porcelain data reports prompts)" ]; then
            echo "No prompt scout changes"
            exit 0
          fi

          git config user.name "seedance-prompt-scout[bot]"
          git config user.email "seedance-prompt-scout[bot]@users.noreply.github.com"
          git add data reports prompts
          git commit -m "Update Seedance prompt scout data"
          git push
